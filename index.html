<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YTube</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { height: 100%; font-size: 14px; -webkit-font-smoothing: antialiased; }

    body {
      height: 100%;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      overflow: hidden;
      /* Default dark — JS overrides immediately */
      background: #090909;
      color: #f0f0f0;
    }

    /* Light mode body */
    [data-theme="light"] body, html[data-theme="light"] body {
      background: #f5f5f5;
      color: #111111;
    }

    #root { height: 100%; display: flex; flex-direction: column; }

    /* Scrollbars — theme-aware via CSS vars set by tokens */
    ::-webkit-scrollbar              { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track        { background: transparent; }
    ::-webkit-scrollbar-thumb        { background: var(--scrollbar-thumb, rgba(255,255,255,0.15)); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover  { background: var(--scrollbar-hover, rgba(255,255,255,0.28)); }
    ::-webkit-scrollbar-corner       { background: transparent; }

    /* Selection — browser default blue, no red override */

    :focus-visible { outline: 2px solid rgba(255,0,0,0.55); outline-offset: 2px; }
  </style>
</head>
<body>
  <div id="root"><yt-app></yt-app></div>
  <script type="module" src="/src/platform/runtime/platform-runtime.ts"></script>
</body>
</html>
